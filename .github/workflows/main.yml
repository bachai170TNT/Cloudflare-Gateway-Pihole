name: Cloudflare Gateway DNS Filter (Block + Allow)

on:
  push:
  # schedule:
  #   - cron: "0 0 * * 5"   # Every Friday midnight UTC
  workflow_dispatch:

jobs:
  run:
    name: Sync Block & Allow Lists
    permissions: write-all
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_IDENTIFIER: ${{ secrets.CF_IDENTIFIER }}
      # Block sources
      ADLIST_URLS: ${{ vars.ADLIST_URLS }}
      DYNAMIC_BLACKLIST: ${{ vars.DYNAMIC_BLACKLIST }}
      # Allow sources
      WHITELIST_URLS: ${{ vars.WHITELIST_URLS }}
      DYNAMIC_WHITELIST: ${{ vars.DYNAMIC_WHITELIST }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@main
        with:
          python-version: "3.11"

      - name: Cache Cloudflare state
        id: cache-cloudflare
        uses: actions/cache@main
        with:
          path: cloudflare_cache.json
          key: ${{ runner.os }}-cloudflare-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cloudflare-cache-

      - name: Run — Sync Block & Allow to Cloudflare Gateway
        id: run_script
        run: |
          # Chạy script Python và đồng thời ghi log ra một file tạm để trích xuất dữ liệu
          python -m src run 2>&1 | tee output.log

      - name: Calculate Stats from Python Logs
        if: success()
        run: |
          # Trích xuất số lượng domain chặn và cho phép
          FINAL_BLOCK_DOMAINS=$(grep -oP "Number of final block domains: \K\d+" output.log || echo "0")
          FINAL_ALLOW_DOMAINS=$(grep -oP "Number of final allow domains: \K\d+" output.log || echo "0")
          
          # Trích xuất số lượng List thực tế đẩy lên Cloudflare (Cấu trúc: Block: X, Allow: Y, Total: Z)
          CF_BLOCK_LISTS=$(grep -oP "Lists needed → Block: \K\d+" output.log || echo "0")
          CF_ALLOW_LISTS=$(grep -oP "Allow: \K\d+" output.log || echo "0")
          CF_TOTAL_LISTS=$(grep -oP "Total: \K\d+" output.log || echo "0")
          
          # Đẩy toàn bộ thông số thực tế vào môi trường GitHub để bước sau sử dụng
          echo "FINAL_BLOCK_DOMAINS=$FINAL_BLOCK_DOMAINS" >> $GITHUB_ENV
          echo "FINAL_ALLOW_DOMAINS=$FINAL_ALLOW_DOMAINS" >> $GITHUB_ENV
          echo "CF_BLOCK_LISTS=$CF_BLOCK_LISTS" >> $GITHUB_ENV
          echo "CF_ALLOW_LISTS=$CF_ALLOW_LISTS" >> $GITHUB_ENV
          echo "CF_TOTAL_LISTS=$CF_TOTAL_LISTS" >> $GITHUB_ENV

      - name: Send Telegram Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🟢 *Cloudflare Gateway DNS Filter*
            🔄 Đồng bộ dữ liệu thành công vĩnh viễn!
            
            📊 *Thống kê tên miền (Domains):*
            • 🚫 Tổng domain chặn: `${{ env.FINAL_BLOCK_DOMAINS }}`
            • ✅ Tổng domain bỏ qua: `${{ env.FINAL_ALLOW_DOMAINS }}`
            
            📦 *Số danh sách trên Cloudflare (Lists):*
            • 📂 Tổng số list: `${{ env.CF_TOTAL_LISTS }}` / 300
              └ Phân đoạn Chặn: `${{ env.CF_BLOCK_LISTS }}` list
              └ Phân đoạn Cho phép: `${{ env.CF_ALLOW_LISTS }}` list
            
            🚀 _Dữ liệu được cập nhật tự động và chính xác từ hệ thống_
