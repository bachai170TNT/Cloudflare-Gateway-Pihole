name: Cloudflare Gateway DNS Filter (Block + Allow)

on:
  push:
  # schedule:
  #   - cron: "0 0 * * 5"   # Every Friday midnight UTC
  workflow_dispatch:

jobs:
  run:
    name: Sync Block & Allow Lists
    permissions: write-all
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_IDENTIFIER: ${{ secrets.CF_IDENTIFIER }}
      # Block sources
      ADLIST_URLS: ${{ vars.ADLIST_URLS }}
      DYNAMIC_BLACKLIST: ${{ vars.DYNAMIC_BLACKLIST }}
      # Allow sources
      WHITELIST_URLS: ${{ vars.WHITELIST_URLS }}
      DYNAMIC_WHITELIST: ${{ vars.DYNAMIC_WHITELIST }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@main
        with:
          python-version: "3.11"

      - name: Cache Cloudflare state
        id: cache-cloudflare
        uses: actions/cache@main
        with:
          path: cloudflare_cache.json
          key: ${{ runner.os }}-cloudflare-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cloudflare-cache-

      - name: Run — Sync Block & Allow to Cloudflare Gateway
        run: python -m src run

      - name: Calculate Stats for Telegram
        if: success()
        id: stats
        run: |
          # 1. Đếm số lượng nguồn (URLs) dựa trên biến cấu hình cấu trúc dấu phẩy hoặc xuống dòng
          TOTAL_BLOCK_LISTS=$(echo "${{ vars.ADLIST_URLS }}" | grep -c '^' || echo "0")
          TOTAL_ALLOW_LISTS=$(echo "${{ vars.WHITELIST_URLS }}" | grep -c '^' || echo "0")
          TOTAL_LISTS=$((TOTAL_BLOCK_LISTS + TOTAL_ALLOW_LISTS))
          
          # Đẩy thông số vào ENV để bước sau dùng
          echo "TOTAL_LISTS=$TOTAL_LISTS" >> $GITHUB_ENV
          echo "BLOCK_SOURCES=$TOTAL_BLOCK_LISTS" >> $GITHUB_ENV
          echo "ALLOW_SOURCES=$TOTAL_ALLOW_LISTS" >> $GITHUB_ENV

      - name: Send Telegram Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🟢 *Cloudflare Gateway DNS Filter*
            🔄 Đồng bộ dữ liệu thành công vĩnh viễn!
            
            📊 *Thông số cấu hình:*
            • Tổng số danh sách nguồn: `${{ env.TOTAL_LISTS }}` list
              └ Chặn (Block): `${{ env.BLOCK_SOURCES }}` nguồn URL
              └ Bỏ qua (Allow): `${{ env.ALLOW_SOURCES }}` nguồn URL
            
            🚀 _Hệ thống tự động chạy ngầm qua Cloudflare Workers và GitHub Actions_
